<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mise à jour - Délices de l'Inde</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            user-select: none;
        }
        h1 {
            font-size: 3em;
            color: #FFC000;
            margin-bottom: 30px;
            letter-spacing: 3px;
        }
        p {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.8);
        }
        .spinner {
            width: 80px;
            height: 80px;
            border: 8px solid rgba(255,192,0,0.2);
            border-top: 8px solid #FFC000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            font-size: 1.2em;
            color: #FFC000;
            margin-top: 30px;
            min-height: 40px;
        }
        .countdown {
            font-size: 4em;
            color: #FFC000;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>
    <h1>MISE À JOUR</h1>
    <div class="spinner"></div>
    <p>Téléchargement des dernières modifications...</p>
    <p class="status" id="status">Connexion au serveur de mise à jour...</p>
    <div class="countdown" id="countdown"></div>
    <p style="margin-top: 40px; font-size: 1em; color: rgba(255,255,255,0.5);">
        La borne va redémarrer automatiquement.
    </p>

    <script>
        const status = document.getElementById('status');
        const countdownEl = document.getElementById('countdown');

        function tryServerUpdate() {
            // Tentative 1 : si le serveur PowerShell tourne, l'API fait git pull + relance
            return fetch('/api/update', {
                method: 'GET',
                cache: 'no-cache'
            }).then(response => {
                if (!response.ok) throw new Error('Server not OK');
                status.textContent = 'Mise à jour réussie ! Redémarrage en cours...';
                return true;
            });
        }

        function fallbackClose() {
            // Tentative 2 : pas de serveur — on ferme Chrome
            // Le launcher .bat doit boucler et relancer après git pull
            status.textContent = 'Fermeture de la borne pour mise à jour...';
            countdownEl.style.display = 'block';
            let count = 5;
            countdownEl.textContent = count;
            const interval = setInterval(() => {
                count--;
                countdownEl.textContent = count;
                if (count <= 0) {
                    clearInterval(interval);
                    // Multiple méthodes pour fermer la borne :
                    // 1. window.close() - marche si la page a été ouverte par script
                    try { window.close(); } catch(e) {}
                    // 2. Naviguer vers about:blank
                    setTimeout(() => {
                        try { window.location.href = 'about:blank'; } catch(e) {}
                    }, 200);
                    // 3. Forcer la fermeture via location
                    setTimeout(() => {
                        try { window.open('', '_self').close(); } catch(e) {}
                    }, 400);
                }
            }, 1000);
        }

        // Tenter d'abord le serveur, fallback sur fermeture
        tryServerUpdate()
            .catch(() => {
                // Pas de serveur disponible, fallback fermeture
                fallbackClose();
            });

        // Sécurité : après 10 secondes, force la fermeture
        setTimeout(() => {
            if (countdownEl.style.display !== 'block') {
                fallbackClose();
            }
        }, 10000);
    </script>
</body>
</html>
